services:
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: charles-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=true
      - ENABLE_OLLAMA_API=false
      - WEBUI_NAME=Charles
    restart: unless-stopped

volumes:
  open-webui-data: