services:
  postgres:
    image: postgres:16
    container_name: charles-db
    environment:
      POSTGRES_USER: charles
      POSTGRES_PASSWORD: charles
      POSTGRES_DB: charles
    volumes:
      # for presistent data nad running on first start
      - postgres-data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # for debugging, REMOVE IN PRODUCTION
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charles -d charles"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  charles-api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: charles-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://charles:charles@postgres:5432/charles
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy # waits for postgres to pass its healthcheck
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: charles-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=true
      - ENABLE_OLLAMA_API=false
      - ENABLE_OPENAI_API=true
      - WEBUI_NAME=Charles
      # Route all LLM traffic through Charles API (OpenAI-compatible proxy)
      - OPENAI_API_BASE_URLS=http://charles-api:8000/v1
      - OPENAI_API_KEYS=sk-charles-local
      - DEFAULT_MODELS=qwen/qwen3-next-80b-a3b-instruct:free
    depends_on:
      charles-api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  open-webui-data:
  postgres-data: