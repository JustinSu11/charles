services:
  postgres:
    image: postgres:16
    container_name: charles-db
    environment:
      POSTGRES_USER: charles
      POSTGRES_PASSWORD: charles
      POSTGRES_DB: charles
    volumes:
      # for presistent data nad running on first start
      - postgres-data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # for debugging, REMOVE IN PRODUCTION
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charles -d charles"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  charles-api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    container_name: charles-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://charles:charles@postgres:5432/charles
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy # waits for postgres to pass its healthcheck
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
volumes:
  postgres-data: