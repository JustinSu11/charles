services:
  postgres:
    image: postgres:16
    container_name: charles-db
    environment:
      POSTGRES_USER: charles
      POSTGRES_PASSWORD: charles
      POSTGRES_DB: charles
    volumes:
      # for presistent data nad running on first start
      - postgres-data:/var/lib/postgresql/data
      - ./api/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      # for debugging, REMOVE IN PRODUCTION
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U charles -d charles"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: charles-webui
    ports:
      - "3000:8080"
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - WEBUI_AUTH=true
      - ENABLE_OLLAMA_API=false
      - WEBUI_NAME=Charles
      - OPENROUTER_API_URL=https://openrouter.ai/api/v1
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - DEFAULT_MODELS=meta-llama/llama-3.3-70b-instruct:free
    restart: unless-stopped

volumes:
  open-webui-data:
  postgres-data: