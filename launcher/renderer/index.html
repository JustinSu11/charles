<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';
                 connect-src http://127.0.0.1:8000 ws://127.0.0.1:8000;" />
  <title>Charles</title>
  <script src="lib/marked.min.js"></script>
  <script src="lib/purify.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:         #0d0d0d;
      --surface:    #1a1a1a;
      --border:     #2a2a2a;
      --text:       #e8e8e8;
      --text-muted: #888;
      --user-bg:    #1e2d40;
      --user-border:#2a4a6e;
      --assist-bg:  #1a1a1a;
      --accent:     #3b82f6;
    }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 14px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
      -webkit-app-region: drag;
    }
    header h1 { font-size: 1.1rem; font-weight: 600; letter-spacing: .03em; }
    #ws-status {
      font-size: .75rem;
      padding: 2px 8px;
      border-radius: 999px;
      background: #1f2937;
      color: var(--text-muted);
    }
    #ws-status.connected    { background: #14532d; color: #4ade80; }
    #ws-status.disconnected { background: #450a0a; color: #f87171; }

    /* ── Message list ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 0;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .turn { display: flex; flex-direction: column; gap: 8px; }

    .bubble {
      max-width: min(680px, 90%);
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      font-size: .9rem;
      word-break: break-word;
    }
    .bubble.user {
      align-self: flex-end;
      margin-right: 20px;
      background: var(--user-bg);
      border: 1px solid var(--user-border);
      border-bottom-right-radius: 4px;
    }
    .bubble.assistant {
      align-self: flex-start;
      margin-left: 20px;
      background: var(--assist-bg);
      border: 1px solid var(--border);
      border-bottom-left-radius: 4px;
    }

    /* voice-origin badge on assistant bubbles */
    .bubble.assistant.from-voice::before {
      content: "voice";
      display: inline-block;
      font-size: .7rem;
      color: #a78bfa;
      background: #2e1065;
      border-radius: 999px;
      padding: 1px 7px;
      margin-bottom: 6px;
    }

    /* markdown inside bubbles */
    .bubble p  { margin-bottom: .6em; }
    .bubble p:last-child { margin-bottom: 0; }
    .bubble code {
      font-family: "SF Mono", "Consolas", monospace;
      font-size: .82em;
      background: #111;
      border-radius: 4px;
      padding: 1px 5px;
    }
    .bubble pre {
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      overflow-x: auto;
      margin: .5em 0;
    }
    .bubble pre code { background: none; padding: 0; }
    .bubble ul, .bubble ol { padding-left: 1.4em; }

    /* ── Wave dot animation (thinking, transcribing, any loading state) ── */
    @keyframes wave {
      0%, 60%, 100% { transform: translateY(0);    opacity: 0.35; }
      30%           { transform: translateY(-5px); opacity: 1;    }
    }
    .wave-dots { display: inline-flex; gap: 3px; vertical-align: middle; }
    .wave-dots span {
      display: inline-block;
      width: 4px; height: 4px;
      border-radius: 50%;
      background: currentColor;
      animation: wave 1.2s ease-in-out infinite;
    }
    .wave-dots span:nth-child(2) { animation-delay: 0.15s; }
    .wave-dots span:nth-child(3) { animation-delay: 0.30s; }

    /* thinking indicator */
    .thinking {
      align-self: flex-start;
      margin-left: 20px;
      color: var(--text-muted);
      font-size: .85rem;
      font-style: italic;
      padding: 8px 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* ── Close dialog overlay ── */
    #close-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #close-overlay.visible { display: flex; }
    #close-dialog {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px 28px;
      width: 300px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    #close-dialog h3 { font-size: .95rem; font-weight: 600; margin: 0; }
    #close-dialog p  { font-size: .82rem; color: var(--text-muted); margin: 0; line-height: 1.5; }
    .close-dialog-btns { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
    .close-dialog-btns button {
      width: 100%; padding: 9px 0; border-radius: 8px;
      font-size: .85rem; font-weight: 600; cursor: pointer; border: none;
    }
    #close-btn-tray { background: var(--accent); color: #fff; }
    #close-btn-tray:hover { background: #2563eb; }
    #close-btn-quit { background: #1f2937; color: #f87171; border: 1px solid #374151 !important; }
    #close-btn-quit:hover { background: #7f1d1d; border-color: #991b1b !important; }

    /* ── Input bar ── */
    #input-bar {
      display: flex;
      gap: 8px;
      padding: 14px 20px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
    #msg-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: .9rem;
      padding: 10px 14px;
      resize: none;
      line-height: 1.5;
      max-height: 140px;
      outline: none;
      font-family: inherit;
    }
    #msg-input:focus { border-color: var(--accent); }
    #send-btn {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 0 18px;
      font-size: .9rem;
      font-weight: 600;
      cursor: pointer;
      flex-shrink: 0;
      align-self: flex-end;
      height: 42px;
    }
    #send-btn:hover   { background: #2563eb; }
    #send-btn:disabled { background: #374151; cursor: not-allowed; }

    /* scrollbar */
    #messages::-webkit-scrollbar { width: 6px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    #top-bar {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      flex-shrink: 0; background: #111;
    }

    .status-dot { width:8px; height:8px; border-radius:50%; background:#555; flex-shrink:0; }
    .status-dot.initializing { background: #f59e0b; }
    .status-dot.ready        { background: var(--accent); }
    .status-dot.voice-active { background: var(--accent); }
    .status-dot.error        { background: #ef4444; }

    #status-label { font-size:.8rem; color:var(--text-muted); flex:1; }

    #voice-pill { font-size:.72rem; padding:2px 8px; border-radius:999px; display:none; }
    #voice-pill.standby      { display:inline; background:#1c2330; color:#6b7280; }
    #voice-pill.loading      { display:inline; background:#1c2330; color:#6b7280; }
    #voice-pill.listening    { display:inline; background:#2e1065; color:#a78bfa; }
    #voice-pill.transcribing { display:inline; background:#1f2937; color:#9ca3af; }
    #voice-pill.thinking     { display:inline; background:#1e3a5f; color:#60a5fa; }
    #voice-pill.speaking     { display:inline; background:#431407; color:#fb923c; }
    #voice-pill.error        { display:inline; background:#1f2937; color:#9ca3af; }

    #start-btn { background:var(--accent); color:#fff; border:none; border-radius:8px; padding:5px 14px; font-size:.8rem; font-weight:600; cursor:pointer; }
    #start-btn:hover:not(:disabled) { background:#1d4ed8; }
    #start-btn:disabled { background:#374151; color:#6b7280; cursor:not-allowed; }
    #stop-btn      { background:#7f1d1d; color:#fca5a5; border:none; border-radius:8px; padding:5px 14px; font-size:.8rem; font-weight:600; cursor:pointer; }
    #stop-btn:hover { background:#991b1b; }
    #interrupt-btn  { background:#1e3a5f; color:#93c5fd; border:none; border-radius:8px; padding:5px 14px; font-size:.8rem; font-weight:600; cursor:pointer; }
    #interrupt-btn:hover { background:#1e40af; }
    #clear-chat-btn { background:transparent; color:#4b5563; border:1px solid #2a2a2a; border-radius:8px; padding:5px 14px; font-size:.8rem; cursor:pointer; }
    #clear-chat-btn:hover { background:#1f2937; color:#9ca3af; }
    #msg-input:disabled { opacity:.4; cursor:not-allowed; }

    /* ── Debug bar shared styles (used inside dev panel) ── */
    .debug-row {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 4px;
    }
    .debug-row:last-child { margin-bottom: 0; }
    .debug-label { width: 110px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .debug-bar-track {
      flex: 1; height: 6px; background: #1a1a1a;
      border-radius: 3px; overflow: hidden;
    }
    .debug-bar-fill {
      height: 100%; width: 0%; border-radius: 3px;
      transition: width 80ms linear;
      background: #3b82f6;
    }
    .debug-bar-fill.rms   { background: #22c55e; }
    .debug-bar-fill.warn  { background: #f59e0b; }
    .debug-bar-fill.hit   { background: #a78bfa; }
    .debug-value { width: 40px; text-align: right; flex-shrink: 0; }

    /* ── Main content area (chat + dev panel side by side) ── */
    #main-content {
      flex: 1; display: flex; flex-direction: row; overflow: hidden;
    }
    #chat-area {
      flex: 1; display: flex; flex-direction: column; overflow: hidden;
    }

    /* ── Developer side panel ── */
    #dev-panel {
      display: none; flex-direction: column;
      width: 280px; flex-shrink: 0;
      background: #080808;
      border-left: 1px solid var(--border);
      font-family: "Consolas", monospace;
      font-size: .72rem;
      color: var(--text-muted);
      overflow: hidden;
    }
    #dev-panel.visible { display: flex; }
    .dev-panel-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      font-size: .75rem; font-weight: 600;
      color: var(--text); flex-shrink: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #dev-panel-close {
      background: transparent; border: none;
      color: var(--text-muted); font-size: .8rem;
      cursor: pointer; padding: 2px 5px; border-radius: 4px;
    }
    #dev-panel-close:hover { background: #1a1a1a; color: var(--text); }
    .dev-section-label {
      padding: 6px 12px 3px;
      font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
      color: #444; flex-shrink: 0;
    }
    #debug-panel-inner {
      padding: 4px 12px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #dev-log {
      flex: 1; overflow-y: auto;
      padding: 4px 0;
    }
    #dev-log::-webkit-scrollbar { width: 4px; }
    #dev-log::-webkit-scrollbar-track { background: transparent; }
    #dev-log::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .dev-log-entry {
      padding: 1px 12px;
      line-height: 1.6;
      display: flex; gap: 5px;
    }
    .dev-log-time   { color: #2a2a2a; flex-shrink: 0; }
    .dev-log-source { flex-shrink: 0; }
    .dev-log-msg    { flex: 1; word-break: break-all; }
    .dev-log-entry.voice      .dev-log-source { color: #4b5563; }
    .dev-log-entry.api        .dev-log-source { color: #3b82f6; }
    .dev-log-entry.api        .dev-log-msg    { color: #60a5fa; }
    .dev-log-entry.transcript .dev-log-source { color: #7c3aed; }
    .dev-log-entry.transcript .dev-log-msg    { color: #a78bfa; font-style: italic; }
    .dev-log-entry.thinking   .dev-log-source { color: #2563eb; }
    .dev-log-entry.thinking   .dev-log-msg    { color: #60a5fa; }
    .dev-log-entry.error      .dev-log-source { color: #b91c1c; }
    .dev-log-entry.error      .dev-log-msg    { color: #f87171; }

    /* ── Settings developer mode toggle ── */
    .settings-toggle-row {
      flex-direction: row !important;
      align-items: center !important;
      justify-content: space-between;
      padding: 2px 0;
    }
    .settings-toggle-row label { margin: 0; font-size: .82rem; color: var(--text-muted); cursor: pointer; }
    .settings-toggle-row input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
    }

    #model-select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-size: .72rem;
      padding: 3px 6px 3px 8px;
      cursor: pointer;
      max-width: 160px;
      -webkit-app-region: no-drag;
    }
    #model-select:focus { outline: none; border-color: var(--accent); }
    #model-select option { background: #1a1a1a; }

    /* ── Settings overlay ── */
    #settings-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.55);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    #settings-overlay.visible { display: flex; }
    #settings-dialog {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 24px 28px;
      width: 360px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #settings-dialog h3 { font-size: .95rem; font-weight: 600; margin: 0; }
    .settings-field { display: flex; flex-direction: column; gap: 6px; }
    .settings-field label { font-size: .78rem; color: var(--text-muted); }
    .settings-field .key-hint { font-size: .72rem; color: #4b5563; }
    .settings-input-row { display: flex; gap: 6px; }
    .settings-input-row input {
      flex: 1;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: .85rem;
      padding: 8px 12px;
      outline: none;
      font-family: "SF Mono", "Consolas", monospace;
    }
    .settings-input-row input:focus { border-color: var(--accent); }
    .settings-input-row input::placeholder { color: #4b5563; font-family: inherit; }
    .btn-show-key {
      background: #1f2937; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 0 10px; font-size: .72rem; cursor: pointer; flex-shrink: 0;
    }
    .btn-show-key:hover { background: #374151; color: var(--text); }
    .settings-note { font-size: .75rem; color: #4b5563; line-height: 1.5; }
    .settings-btns { display: flex; gap: 8px; margin-top: 4px; }
    .settings-btns button {
      flex: 1; padding: 9px 0; border-radius: 8px;
      font-size: .85rem; font-weight: 600; cursor: pointer; border: none;
    }
    #settings-save-btn { background: var(--accent); color: #fff; }
    #settings-save-btn:hover:not(:disabled) { background: #2563eb; }
    #settings-save-btn:disabled { background: #374151; color: #6b7280; cursor: not-allowed; }
    #settings-cancel-btn { background: #1f2937; color: var(--text-muted); border: 1px solid var(--border) !important; }
    #settings-cancel-btn:hover { background: #374151; }
    #settings-btn {
      background: transparent; color: var(--text-muted);
      border: 1px solid var(--border); border-radius: 6px;
      padding: 3px 8px; font-size: .82rem; cursor: pointer;
    }
    #settings-btn:hover { background: #1a1a1a; color: var(--text); }

    /* ── Update banner ── */
    #update-banner {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px 20px;
      font-size: .8rem;
      flex-shrink: 0;
    }
    #update-banner.downloading {
      display: flex;
      background: #1c2330;
      color: #6b7280;
      border-bottom: 1px solid var(--border);
    }
    #update-banner.ready {
      display: flex;
      background: #1a2e1a;
      color: #4ade80;
      border-bottom: 1px solid #166534;
    }
    #update-banner span { flex: 1; }
    #update-install-btn {
      background: #16a34a; color: #fff;
      border: none; border-radius: 6px;
      padding: 4px 14px; font-size: .78rem;
      font-weight: 600; cursor: pointer;
    }
    #update-install-btn:hover { background: #15803d; }

    .win-controls { margin-left:auto; display:flex; gap:4px; -webkit-app-region:no-drag; }
    .win-controls button {
      width:28px; height:22px; border:none; border-radius:4px;
      background:#2a2a2a; color:var(--text-muted); font-size:.8rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .win-controls button:hover { background:#3a3a3a; color:var(--text); }
    #btn-close:hover { background:#7f1d1d; color:#fca5a5; }
    </style>
</head>
<body>

<header>
  <h1>Charles</h1>
  <span id="ws-status">connecting…</span>
</header>

<!-- Update banner — hidden until auto-updater fires -->
<div id="update-banner">
  <span id="update-msg">Downloading update…</span>
  <button id="update-install-btn" style="display:none">Restart to update</button>
</div>

<div id="top-bar">
  <div class="status-dot" id="status-dot"></div>
  <span id="status-label">Stopped</span>
  <span id="voice-pill"></span>
  <button id="start-btn">Start</button>
  <button id="stop-btn"      style="display:none">Stop</button>
  <button id="interrupt-btn"   style="display:none">⏹ Interrupt</button>
  <button id="clear-chat-btn" title="Clear conversation history">🗑 Clear</button>
  <button id="settings-btn" title="Settings">⚙</button>
  <select id="model-select" title="Active model">
    <option disabled selected>Loading models…</option>
  </select>
  <div class="win-controls">
    <button id="btn-minimize" title="Minimize">&#8722;</button>
    <button id="btn-close"    title="Close">&#x2715;</button>
  </div>
</div>

<div id="main-content">
  <div id="chat-area">
    <div id="messages"></div>
    <div id="input-bar">
      <textarea id="msg-input" rows="1" placeholder="Message Charles…"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>

  <div id="dev-panel">
    <div class="dev-panel-header">
      <span>Developer</span>
      <button id="dev-panel-close" title="Close panel">✕</button>
    </div>
    <div class="dev-section-label">Audio</div>
    <div id="debug-panel-inner">
      <div class="debug-row" id="debug-row-rms">
        <span class="debug-label">Mic level</span>
        <div class="debug-bar-track"><div class="debug-bar-fill rms" id="debug-fill-rms"></div></div>
        <span class="debug-value" id="debug-val-rms">—</span>
      </div>
      <!-- model score rows injected by JS -->
    </div>
    <div class="dev-section-label">Event Log</div>
    <div id="dev-log"></div>
  </div>
</div>

<!-- Settings dialog -->
<div id="settings-overlay">
  <div id="settings-dialog">
    <h3>Settings</h3>
    <div class="settings-field">
      <label for="settings-openrouter-key">OpenRouter API Key <span style="color:#ef4444">*</span></label>
      <div class="settings-input-row">
        <input id="settings-openrouter-key" type="password" placeholder="sk-or-v1-…" autocomplete="off" spellcheck="false" />
        <button class="btn-show-key" data-target="settings-openrouter-key">Show</button>
      </div>
    </div>
    <div class="settings-field">
      <label for="settings-virustotal-key">VirusTotal API Key <span class="key-hint">(optional)</span></label>
      <div class="settings-input-row">
        <input id="settings-virustotal-key" type="password" placeholder="Leave blank to remove" autocomplete="off" spellcheck="false" />
        <button class="btn-show-key" data-target="settings-virustotal-key">Show</button>
      </div>
    </div>
    <div class="settings-field settings-toggle-row">
      <label for="settings-dev-mode">Developer Mode</label>
      <input type="checkbox" id="settings-dev-mode" />
    </div>
    <p class="settings-note">Saving will restart the Charles API to apply new keys.</p>
    <div class="settings-btns">
      <button id="settings-cancel-btn">Cancel</button>
      <button id="settings-save-btn">Save &amp; Restart</button>
    </div>
  </div>
</div>

<!-- Close dialog -->
<div id="close-overlay">
  <div id="close-dialog">
    <h3>Close Charles?</h3>
    <p>Minimize to the system tray to keep Charles running in the background, or quit to stop all services.</p>
    <div class="close-dialog-btns">
      <button id="close-btn-tray">Minimize to Tray</button>
      <button id="close-btn-quit">Quit Charles</button>
    </div>
  </div>
</div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const API_BASE = 'http://127.0.0.1:8000';
const WS_URL   = 'ws://127.0.0.1:8000/ws';

// ── State ─────────────────────────────────────────────────────────────────────
let conversationId      = null;   // set after first turn or history load
let pendingTurn         = null;   // DOM node for the "thinking…" indicator
let thinkingInterval    = null;   // setInterval ID for the animated dots
let pendingVoiceWrapper = null;   // .turn wrapper rendered immediately on voice transcript
let socket              = null;

// ── DOM refs ──────────────────────────────────────────────────────────────────
const $messages = document.getElementById("messages");
const $input    = document.getElementById("msg-input");
const $sendBtn  = document.getElementById("send-btn");
const $wsStatus = document.getElementById("ws-status");

// ── Marked config ─────────────────────────────────────────────────────────────
marked.setOptions({ breaks: true, gfm: true });

/** Render markdown → sanitized HTML string. */
function md(content) {
  return DOMPurify.sanitize(marked.parse(content));
}

// ── Render helpers ────────────────────────────────────────────────────────────

/**
 * renderTurn — render a user+assistant pair.
 * Called both from WS "turn" events and when replaying history on load.
 *
 * @param {{ interface: string, user: {content:string}, assistant: {content:string} }} turn
 */
function renderTurn(turn) {
  const wrapper = document.createElement("div");
  wrapper.className = "turn";

  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = turn.user.content;  // plain text — no XSS risk

  const assistBubble = document.createElement("div");
  assistBubble.className = "bubble assistant" + (turn.interface === "voice" ? " from-voice" : "");
  assistBubble.innerHTML = md(turn.assistant.content);  // sanitized markdown

  wrapper.appendChild(userBubble);
  wrapper.appendChild(assistBubble);
  $messages.appendChild(wrapper);
  scrollToBottom();
}

function showThinking() {
  pendingTurn = document.createElement("div");
  pendingTurn.className = "thinking";
  pendingTurn.innerHTML =
    'Charles is thinking <span class="wave-dots"><span></span><span></span><span></span></span>';
  $messages.appendChild(pendingTurn);
  scrollToBottom();
}

function clearThinking() {
  if (thinkingInterval) { clearInterval(thinkingInterval); thinkingInterval = null; }
  if (pendingTurn) { pendingTurn.remove(); pendingTurn = null; }
}

/** Render a standalone error/info bubble (assistant style). */
function renderInfo(text) {
  const el = document.createElement("div");
  el.className = "bubble assistant";
  el.textContent = text;
  $messages.appendChild(el);
  scrollToBottom();
}

/**
 * showVoiceTranscript — render the user bubble immediately after Whisper
 * transcribes, before the AI reply arrives.  Stores a reference to the
 * wrapper so the WS handler can append the assistant bubble to it later
 * instead of calling renderTurn (which would double-render the user text).
 */
function showVoiceTranscript(text) {
  pendingVoiceWrapper = document.createElement("div");
  pendingVoiceWrapper.className = "turn";

  const userBubble = document.createElement("div");
  userBubble.className = "bubble user";
  userBubble.textContent = text;

  pendingVoiceWrapper.appendChild(userBubble);
  $messages.appendChild(pendingVoiceWrapper);
  scrollToBottom();
  showThinking();
}

function scrollToBottom() {
  $messages.scrollTop = $messages.scrollHeight;
}

// ── History load ──────────────────────────────────────────────────────────────
async function loadHistory() {
  try {
    const res = await fetch(`${API_BASE}/history/shared`);
    if (res.status === 404) return;   // no conversation yet — empty state
    if (!res.ok) return;

    const data = await res.json();
    conversationId = data.conversation_id;

    // Group messages into user/assistant pairs for rendering
    const msgs = data.messages;
    for (let i = 0; i < msgs.length; i++) {
      if (msgs[i].role === "user" && msgs[i + 1]?.role === "assistant") {
        renderTurn({
          interface: "web",
          user:      { content: msgs[i].content },
          assistant: { content: msgs[i + 1].content },
        });
        i++;  // skip the assistant message we just consumed
      }
    }
  } catch (e) {
    console.warn("Could not load history:", e);
  }
}

// ── WebSocket ─────────────────────────────────────────────────────────────────

/**
 * connectWebSocket — connect to /ws with exponential-backoff reconnection.
 *
 * @param {number} attempt  - current attempt index (0 = first connect)
 */
function connectWebSocket(attempt = 0) {
  socket = new WebSocket(WS_URL);

  socket.onopen = () => {
    $wsStatus.textContent = "connected";
    $wsStatus.className   = "connected";
  };

  socket.onmessage = (event) => {
    const msg = JSON.parse(event.data);
    if (msg.type !== "turn") return;
    if (!conversationId) conversationId = msg.conversation_id;
    clearThinking();

    if (pendingVoiceWrapper && msg.interface === "voice") {
      // User bubble was already rendered by showVoiceTranscript — only add
      // the assistant bubble into the same wrapper to keep DOM structure intact.
      // md() sanitizes via DOMPurify before setting innerHTML (same as renderTurn).
      const assistBubble = document.createElement("div");
      assistBubble.className = "bubble assistant from-voice";
      assistBubble.innerHTML = md(msg.assistant.content); // md() = DOMPurify.sanitize(marked.parse(...))
      pendingVoiceWrapper.appendChild(assistBubble);
      pendingVoiceWrapper = null;
      scrollToBottom();
    } else {
      renderTurn(msg);
    }
  };

  socket.onclose = () => {
    $wsStatus.textContent = "disconnected";
    $wsStatus.className   = "disconnected";

    // TODO: your turn — implement reconnection here.
    //
    // Hints:
    //   - setTimeout(() => connectWebSocket(attempt + 1), delayMs)
    //   - Exponential backoff: Math.min(1000 * 2 ** attempt, 30_000)
    //   - Give up after e.g. 10 attempts and leave status as "disconnected"
  };

  socket.onerror = () => {
    $wsStatus.textContent = "error";
    $wsStatus.className   = "disconnected";
  };
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = $input.value.trim();
  if (!text) return;

  $input.value = "";
  $input.style.height = "auto";
  $sendBtn.disabled = true;
  showThinking();

  const controller = new AbortController();
  const timeoutId  = setTimeout(() => controller.abort(), 120_000);

  try {
    const body = { message: text, interface: "web" };
    if (conversationId) body.conversation_id = conversationId;

    const res = await fetch(`${API_BASE}/chat`, {
      method:  "POST",
      headers: { "Content-Type": "application/json" },
      body:    JSON.stringify(body),
      signal:  controller.signal,
    });

    if (!res.ok) {
      clearThinking();
      const err = await res.json().catch(() => ({ detail: "Unknown error" }));
      renderInfo(`Error ${res.status}: ${err.detail ?? "Unknown error"}`);
    }
    // On success the WS broadcast renders the turn — nothing more to do here.
  } catch (e) {
    clearThinking();
    if (e.name === 'AbortError') {
      renderInfo("The Charles API timed out. Please try again.");
    } else {
      renderInfo(`Could not reach Charles API: ${e.message}`);
    }
  } finally {
    clearTimeout(timeoutId);
    $sendBtn.disabled = false;
    $input.focus();
  }
}

// ── Input events ──────────────────────────────────────────────────────────────
$sendBtn.addEventListener("click", sendMessage);

$input.addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

$input.addEventListener("input", () => {
  $input.style.height = "auto";
  $input.style.height = Math.min($input.scrollHeight, 140) + "px";
});

// ── Boot ──────────────────────────────────────────────────────────────────────
(async () => {
  $input.focus();
})();
// Top bar DOM refs
const $startBtn      = document.getElementById('start-btn');
const $stopBtn       = document.getElementById('stop-btn');
const $interruptBtn  = document.getElementById('interrupt-btn');
const $clearChatBtn  = document.getElementById('clear-chat-btn');
const $dot       = document.getElementById('status-dot');
const $label     = document.getElementById('status-label');
const $voicePill = document.getElementById('voice-pill');

function setStatus(state, message) {
  $dot.className = `status-dot ${state}`;
  $label.textContent = {
    initializing: 'Starting…',
    ready:         'Ready',
    'voice-active':'Voice Active',
    error:          message || 'Error',
  }[state] ?? state;

  const isReady       = state === 'ready' || state === 'voice-active';
  const isVoiceActive = state === 'voice-active';

  $startBtn.style.display = state === 'ready'   ? 'inline' : 'none';
  $stopBtn.style.display  = isVoiceActive        ? 'inline' : 'none';
  $input.disabled         = !isReady;
  $sendBtn.disabled       = !isReady;
  $input.placeholder      = isReady ? 'Message Charles…' : 'Charles is starting…';
  if (!isVoiceActive) { $voicePill.className = ''; $voicePill.textContent = ''; }
}

function setVoiceState(state) {
  const DOTS = '<span class="wave-dots"><span></span><span></span><span></span></span>';
  const labels = {
    loading:      `Warming up ${DOTS}`,
    standby:      'Say "Hey Charles"',
    listening:    `Listening ${DOTS}`,
    transcribing: `Listening ${DOTS}`,
    thinking:     `Thinking ${DOTS}`,
    speaking:     `Speaking ${DOTS}`,
    error:        'Voice offline',
  };
  $voicePill.className = state;
  $voicePill.innerHTML = labels[state] ?? '';
  // Interrupt button only shows while Charles is speaking
  $interruptBtn.style.display = (state === 'speaking') ? 'inline' : 'none';
  // If voice returns to listening or standby, the previous turn is done —
  // clear any stuck thinking bubble left over from an API error.
  if (state === 'listening' || state === 'standby') clearThinking();
}

// IPC wiring — service controls
$startBtn.addEventListener('click',     () => window.electronAPI.start());
$stopBtn.addEventListener('click',      () => window.electronAPI.stop());
$interruptBtn.addEventListener('click', () => window.electronAPI.interrupt());

// Clear chat — deletes the shared conversation from the API and wipes the UI
$clearChatBtn.addEventListener('click', async () => {
  if (!conversationId) {
    document.getElementById('messages').innerHTML = '';
    return;
  }
  try {
    await fetch(`${API_BASE}/history/${conversationId}`, { method: 'DELETE' });
  } catch (e) {
    console.warn('Clear chat API call failed:', e);
  }
  // Wipe the UI and reset local state regardless of API outcome
  document.getElementById('messages').innerHTML = '';
  conversationId = null;
});

// ── Model selector ────────────────────────────────────────────────────────────
const $modelSelect = document.getElementById('model-select');
let modelSelectReady = false;

async function initModelSelector() {
  if (modelSelectReady) return;
  try {
    const [listRes, currentRes] = await Promise.all([
      fetch(`${API_BASE}/models`),
      fetch(`${API_BASE}/settings/model`),
    ]);
    const { models }       = await listRes.json();
    const { model: active } = await currentRes.json();

    $modelSelect.textContent = '';
    for (const m of models) {
      const opt = document.createElement('option');
      opt.value       = m.id;
      opt.textContent = m.name;
      if (m.id === active) opt.selected = true;
      $modelSelect.appendChild(opt);
    }
    // If the active model isn't in the returned list, prepend it so the
    // UI always reflects the real selection (e.g. set via env var).
    if ($modelSelect.value !== active) {
      const opt = document.createElement('option');
      opt.value = active; opt.textContent = active; opt.selected = true;
      $modelSelect.insertBefore(opt, $modelSelect.firstChild);
    }
    modelSelectReady = true;
  } catch {
    $modelSelect.options[0].textContent = 'Model unavailable';
  }
}

$modelSelect.addEventListener('change', () => {
  fetch(`${API_BASE}/settings/model`, {
    method:  'PUT',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ model: $modelSelect.value }),
  });
});

// Window chrome controls (frameless window has no native buttons)
document.getElementById('btn-minimize').addEventListener('click', () => window.electronAPI.minimize());

// Close button — show dialog instead of closing immediately
const $closeOverlay = document.getElementById('close-overlay');
document.getElementById('btn-close').addEventListener('click', () => {
  $closeOverlay.classList.add('visible');
});
// Click outside the dialog card → dismiss
$closeOverlay.addEventListener('click', (e) => {
  if (e.target === $closeOverlay) $closeOverlay.classList.remove('visible');
});
document.getElementById('close-btn-tray').addEventListener('click', () => {
  $closeOverlay.classList.remove('visible');
  window.electronAPI.closeWindow();
});
document.getElementById('close-btn-quit').addEventListener('click', () => {
  window.electronAPI.quitApp();
});

// ── Settings dialog ───────────────────────────────────────────────────────────
const $settingsOverlay   = document.getElementById('settings-overlay');
const $settingsSaveBtn   = document.getElementById('settings-save-btn');
const $settingsCancelBtn = document.getElementById('settings-cancel-btn');
const $orKey             = document.getElementById('settings-openrouter-key');
const $vtKey             = document.getElementById('settings-virustotal-key');

document.getElementById('settings-btn').addEventListener('click', async () => {
  const [keys, prefs] = await Promise.all([
    window.electronAPI.getApiKeys(),
    window.electronAPI.getPrefs(),
  ]);
  $orKey.value = keys.openrouterKey;
  $vtKey.value = keys.virustotalKey;
  document.getElementById('settings-dev-mode').checked = !!prefs.developerMode;
  $settingsOverlay.classList.add('visible');
  $orKey.focus();
});

$settingsOverlay.addEventListener('click', (e) => {
  if (e.target === $settingsOverlay) $settingsOverlay.classList.remove('visible');
});

$settingsCancelBtn.addEventListener('click', () => {
  $settingsOverlay.classList.remove('visible');
});

$settingsSaveBtn.addEventListener('click', async () => {
  const openrouterKey = $orKey.value.trim();
  if (!openrouterKey) { $orKey.focus(); return; }
  $settingsSaveBtn.disabled = true;
  $settingsSaveBtn.textContent = 'Restarting…';
  try {
    const newDevMode = document.getElementById('settings-dev-mode').checked;
    await Promise.all([
      window.electronAPI.saveApiKeys({
        openrouterKey,
        virustotalKey: $vtKey.value.trim(),
      }),
      window.electronAPI.savePrefs({ developerMode: newDevMode }),
    ]);
    // Apply dev panel visibility immediately
    devPanelVisible = newDevMode;
    document.getElementById('dev-panel').classList.toggle('visible', devPanelVisible);
    $settingsOverlay.classList.remove('visible');
  } finally {
    $settingsSaveBtn.disabled = false;
    $settingsSaveBtn.textContent = 'Save & Restart';
  }
});

// Show/hide toggles for key inputs
document.querySelectorAll('.btn-show-key').forEach((btn) => {
  btn.addEventListener('click', () => {
    const input = document.getElementById(btn.dataset.target);
    const showing = input.type === 'text';
    input.type = showing ? 'password' : 'text';
    btn.textContent = showing ? 'Show' : 'Hide';
  });
});

// ── Developer panel ───────────────────────────────────────────────────────────
const $devPanel        = document.getElementById('dev-panel');
const $devLog          = document.getElementById('dev-log');
const $debugPanelInner = document.getElementById('debug-panel-inner');
const $debugFillRms    = document.getElementById('debug-fill-rms');
const $debugValRms     = document.getElementById('debug-val-rms');
const _debugModelRows  = {};
let devPanelVisible    = false;

async function loadDevPanelState() {
  try {
    const prefs = await window.electronAPI.getPrefs();
    devPanelVisible = !!prefs.developerMode;
    $devPanel.classList.toggle('visible', devPanelVisible);
  } catch {}
}

function addLogEntry(source, message, type) {
  const entryType = type || 'voice';
  const ts = new Date().toTimeString().slice(0, 8);
  const entry = document.createElement('div');
  entry.className = 'dev-log-entry ' + entryType;
  const timeSpan   = document.createElement('span');
  timeSpan.className = 'dev-log-time';
  timeSpan.textContent = ts;
  const sourceSpan = document.createElement('span');
  sourceSpan.className = 'dev-log-source';
  sourceSpan.textContent = '[' + source + ']';
  const msgSpan    = document.createElement('span');
  msgSpan.className = 'dev-log-msg';
  msgSpan.textContent = message;
  entry.appendChild(timeSpan);
  entry.appendChild(sourceSpan);
  entry.appendChild(msgSpan);
  $devLog.insertBefore(entry, $devLog.firstChild);
  // Cap at 200 entries to prevent unbounded memory growth
  while ($devLog.children.length > 200) { $devLog.removeChild($devLog.lastChild); }
}

document.getElementById('dev-panel-close').addEventListener('click', async () => {
  devPanelVisible = false;
  $devPanel.classList.remove('visible');
  document.getElementById('settings-dev-mode').checked = false;
  await window.electronAPI.savePrefs({ developerMode: false });
});

function _getOrCreateModelRow(name) {
  if (_debugModelRows[name]) return _debugModelRows[name];
  const row = document.createElement('div');
  row.className = 'debug-row';
  const label = document.createElement('span');
  label.className = 'debug-label';
  label.textContent = name;
  label.title = name;
  const track = document.createElement('div');
  track.className = 'debug-bar-track';
  const fill = document.createElement('div');
  fill.className = 'debug-bar-fill';
  track.appendChild(fill);
  const val = document.createElement('span');
  val.className = 'debug-value';
  row.appendChild(label);
  row.appendChild(track);
  row.appendChild(val);
  $debugPanelInner.appendChild(row);
  _debugModelRows[name] = { fill, val };
  return _debugModelRows[name];
}

const cleanupDebug = window.electronAPI.onVoiceDebug((payload) => {
  if (!devPanelVisible) return;
  const { rms, ...modelScores } = payload;

  // Mic level bar (RMS normalised 0–1, displayed as %)
  if (rms !== undefined) {
    const pct = Math.min(rms * 100 * 5, 100);  // ×5 so normal speech shows clearly
    $debugFillRms.style.width = `${pct}%`;
    $debugFillRms.className = 'debug-bar-fill rms' + (rms > 0.15 ? ' warn' : '');
    $debugValRms.textContent = rms.toFixed(4);
  }

  // Per-model score bars
  for (const [name, score] of Object.entries(modelScores)) {
    const { fill, val } = _getOrCreateModelRow(name);
    const pct = Math.min(score * 100 / 0.5 * 50, 100); // scale so threshold=50%
    fill.style.width = `${pct}%`;
    fill.className = 'debug-bar-fill' + (score >= 0.5 ? ' hit' : '');
    val.textContent = score.toFixed(4);
  }
});

// Load dev panel state on startup
loadDevPanelState();

const cleanupStatus = window.electronAPI.onStatusUpdate(({ state, message }) => {
  setStatus(state, message);
  // Connect WebSocket the first time the API becomes ready
  if (state === 'ready' || state === 'voice-active') {
    if (!socket || socket.readyState === WebSocket.CLOSED) {
      loadHistory().then(() => connectWebSocket());
    }
    initModelSelector();
  }
  // Log to dev panel
  if      (state === 'error')        addLogEntry('api', message || 'Error', 'error');
  else if (state === 'initializing') addLogEntry('api', 'Starting…', 'api');
  else if (state === 'ready')        addLogEntry('api', 'Ready', 'api');
});
const cleanupVoice = window.electronAPI.onVoiceState(({ state }) => {
  setVoiceState(state);
  const type = state === 'thinking' ? 'thinking' : state === 'error' ? 'error' : 'voice';
  addLogEntry('voice', state, type);
});
const cleanupTranscript = window.electronAPI.onVoiceTranscript(({ text }) => {
  showVoiceTranscript(text);
  addLogEntry('transcript', '"' + text + '"', 'transcript');
});

// ── Auto-update banner ────────────────────────────────────────────────────────
const $updateBanner  = document.getElementById('update-banner');
const $updateMsg     = document.getElementById('update-msg');
const $updateInstall = document.getElementById('update-install-btn');

window.electronAPI.onUpdateStatus(({ state }) => {
  if (state === 'downloading') {
    $updateBanner.className = 'downloading';
    $updateMsg.textContent  = 'Downloading update…';
    $updateInstall.style.display = 'none';
  } else if (state === 'ready') {
    $updateBanner.className = 'ready';
    $updateMsg.textContent  = 'Update ready';
    $updateInstall.style.display = 'inline';
  }
});

$updateInstall.addEventListener('click', () => window.electronAPI.installUpdate());

window.addEventListener('beforeunload', () => { cleanupStatus(); cleanupVoice(); cleanupTranscript(); cleanupDebug(); });

// Initial state — API is auto-starting in the background
setStatus('initializing');

</script>
</body>
</html>
